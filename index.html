<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morning Brief</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="container page-header">
        <p class="eyebrow">Morning Brief</p>
        <h1>朝の入口として、今日の生成AIトピックを一目で把握する</h1>
        <p class="lead">
          最新号の要点を冒頭にまとめ、過去号はカードから選択、本文はその場で落ち着いて読める構成にしています。
        </p>
      </header>

      <main class="container layout">
        <section id="hero" class="hero-panel">
          <p class="muted">最新号を読み込み中...</p>
        </section>

        <section class="content-panel">
          <div class="section-heading">
            <div>
              <p class="section-label">Selected Brief</p>
              <h2 id="article-title">Morning Brief</h2>
            </div>
            <p id="article-meta" class="muted"></p>
          </div>
          <article id="content" class="card markdown">
            <p class="muted">記事を読み込み中...</p>
          </article>
        </section>

        <aside class="archive-panel">
          <div class="section-heading">
            <div>
              <p class="section-label">Archive</p>
              <h2>過去号一覧</h2>
            </div>
            <p class="muted">カードから本文を切り替えられます。</p>
          </div>
          <div id="list" class="stack"></div>
        </aside>
      </main>
    </div>

    <script type="module" src="assets/app.js"></script>
  </body>
</html>
