name: Deploy Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/index.html"
      - "docs/assets/**"
      - "docs/content/**"
      - "docs/public/index.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # Branch公開モードに合わせる場合は /docs を使える。
  # Actions配信でも docs をartifact元にしておく。
  PAGES_ARTIFACT_DIR: docs

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_ARTIFACT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
